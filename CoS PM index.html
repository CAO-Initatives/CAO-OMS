<style>

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Segoe UI,Arial,sans-serif;background:var(--bg);color:#111;font-size:13px}

.item{display:flex;gap:9px;padding:8px 0;border-bottom:1px solid #f3f4f6}.item:last-child{border-bottom:0}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}

.srch:focus{outline:none;border-color:var(--nv)}
.chips{display:flex;gap:4px;flex-wrap:wrap}
.chip{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid var(--ln);background:#fff;color:var(--mu);user-select:none;transition:all .12s}

.cal-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.cmo{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.07);overflow:hidden}
.cmh{background:var(--nv);color:#fff;padding:8px 11px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px}

.cmb{padding:7px;min-height:70px}
.pill{font-size:10px;font-weight:700;border-radius:5px;padding:3px 6px;margin:2px 0;cursor:pointer;line-height:1.3;display:flex;justify-content:space-between;align-items:flex-start;gap:3px}
.pill:hover{opacity:.75}
.stag{font-size:8px;font-weight:900;opacity:.65;flex-shrink:0;margin-top:1px}
.csom{background:#fef3c7;color:#92400e}.cwfu{background:#dbeafe;color:#1e40af}.cwfb{background:#ede9fe;color:#5b21b6}
.cadv{background:#ccfbf1;color:#0f766e}.ccab{background:#fee2e2;color:#991b1b}.cstr{background:#f3e8ff;color:#6d28d9}

.rcl{cursor:pointer;font-size:10px;transition:background .1s}.rcl:hover{background:#eff6ff!important}
.sns{background:#fff}.sip{background:#fef3c7}.sdn{background:#dcfce7}

.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;align-items:center;justify-content:center}

.modal{background:#fff;border-radius:11px;width:540px;max-width:96vw;max-height:91vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}

.fc{width:100%;padding:7px 9px;border:1.5px solid var(--ln);border-radius:6px;font-size:12px;color:#111;font-family:inherit;background:#fff}

.fr{display:grid;grid-template-columns:1fr 1fr;gap:9px}

.brief-wrap{max-width:780px;background:#fff;border-radius:10px;box-shadow:0 1px 5px rgba(0,0,0,.07);padding:24px}

.bmtg{margin-bottom:9px;padding-left:10px;border-left:3px solid #e5e7eb}

.bct{font-weight:800;font-size:11px;margin-bottom:4px;text-decoration:underline;color:#374151}
.bloc-row{font-size:12px;padding:4px 0;border-bottom:1px solid #f3f4f6}
/* ACTION BOARD */
.ab-wrap{max-width:1050px}
.ab-hd{background:var(--nv);color:#fff;padding:15px 20px;border-radius:10px 10px 0 0}
.ab-hd h1{font-size:17px;font-weight:900;margin:0}
.ab-sub{font-size:10px;opacity:.6;margin-top:3px}
.ab-body{background:#fff;border-radius:0 0 10px 10px;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.ab-sec{border-bottom:1px solid var(--ln)}.ab-sec:last-child{border-bottom:0}
.ab-sh{padding:9px 16px;background:#f8fafc;border-bottom:1px solid var(--ln);font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.7px;color:#374151;display:flex;justify-content:space-between;align-items:center}
.ab-row{display:flex;align-items:flex-start;gap:9px;padding:10px 16px;border-bottom:1px solid #f3f4f6}
.ab-row:last-child{border-bottom:0}
.ab-num{font-size:11px;font-weight:800;color:var(--mu);min-width:16px;margin-top:1px}
.ab-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:3px}
.ab-bd{flex:1;min-width:0}.ab-t{font-weight:800;font-size:12px;margin-bottom:2px}
.ab-m{font-size:11px;color:var(--mu);line-height:1.45}
.ab-inp{font-size:11px;color:#374151;margin-top:3px;background:#fff8f0;padding:4px 8px;border-radius:4px;border-left:3px solid var(--rd)}
.callout{padding:10px 14px;border-radius:7px;margin:8px 0;border-left:4px solid}
.co-r{background:#fef2f2;border-color:var(--rd);color:#7f1d1d}
.co-y{background:#fffbeb;border-color:var(--ye);color:#78350f}
.co-b{background:#eff6ff;border-color:var(--bl);color:#1e3a5f}
.ovd{color:var(--rd);font-weight:800}
@media print{header,nav,.tb,.btn,.overlay,.no-print{display:none!important}main{padding:0;max-width:none}body{background:#fff}.tab{display:none!important}.tab.print-me{display:block!important}.card,.cmo,.ab-wrap,.brief-wrap{box-shadow:none;border:1px solid #ddd}.cal-grid{grid-template-columns:repeat(3,1fr)}.bday{color:#C00000!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}}
@media(max-width:900px){.g2,.g3,.g4,.cal-grid{grid-template-columns:1fr 1fr}.fr{grid-template-columns:1fr}}
@media(max-width:600px){.g2,.g3,.g4,.cal-grid{grid-template-columns:1fr}}
</style>

<script>
const TODAY=new Date('2026-06-04T12:00:00');

const CB={'SOM Events':'by','WFU BOT':'bb','WFUBSM BOD':'bp','Advocate BOD':'bt','Cabinet':'br3','Strategy Sessions':'bp','FEC':'by','Chairs':'bsk','Board Meeting':'bp','Alumni/Philanthropy':'bt','Other':'bgr','EB OOO':'bgr'};
let ST={},curTab='dash',calSrc='overlay',calView='grid',calSearch='',sopQ='',delQ='',delSt='All',delOw='All';

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5)}
function dp(s){return s?new Date(s.includes('T')?s:s+'T12:00:00'):null}
function fmt(s){if(!s)return'';let d=dp(s);return(d.getMonth()+1)+'/'+d.getDate()+'/'+d.getFullYear()}
function short(s){if(!s)return'';let d=dp(s);return MNA[d.getMonth()]+' '+d.getDate()}
function dFrom(s){if(!s)return null;return Math.ceil((dp(s)-TODAY)/86400000)}
function isOv(s){return s&&dp(s)<TODAY}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function gv(i){let e=document.getElementById(i);return e?e.value:''}
function owC(o){if(!o)return'ows';let l=(o||'').toLowerCase();if(l.includes('maggie')||l.includes('scirica'))return'owm';if(l.includes('hossam'))return'owh';if(l.includes('ari')||l.includes('ball'))return'owa';if(l.includes('lola')||l.includes('brown'))return'owl';return'ows'}
function owT(o){return`<span class="ow ${owC(o)}">${esc(o||'—')}</span>`}
function bdg(t,c){return`<span class="b ${c||'bgr'}">${esc(t||'')}</span>`}
function stB(s){const m={'Complete':'bg3','Completed':'bg3','Completed/Approved':'bg3','In Progress':'by','Pending':'by','Ready for review':'by','Draft ready for EB review':'by','Not Started':'bgr','FYI':'bb','Request Submitted':'by','Drafted':'by','Lola Drafting':'by','Needed':'br3','N/A':'bgr','Alumni Drafting':'by','Philanthropy writing':'by'};return bdg(s,m[s]||'bgr')}
function priB(p){return bdg(p,p==='High'?'br3':p==='Medium'?'by':'bg3')}
function save(){try{localStorage.setItem('doos_v6',JSON.stringify(ST))}catch(e){}document.getElementById('ts').textContent='Saved '+new Date().toLocaleTimeString()}
function load(){let x=localStorage.getItem('doos_v6');if(x){try{ST=JSON.parse(x);return true}catch(e){}}return false}
function resetAll(){ST=buildSeed();save();renderAll()}
function go(t){curTab=t;document.querySelectorAll('nav button').forEach((b,i)=>{const ts=['dash','brief','board','cal','rob','sops','del'];b.classList.toggle('on',ts[i]===t)});document.querySelectorAll('.tab').forEach(s=>s.classList.remove('on'));document.getElementById(t).classList.add('on');renderAll()}
function doPrint(){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('print-me'));document.getElementById(curTab).classList.add('print-me');window.print()}
function closeModal(){document.getElementById('overlay').classList.remove('on')}
function openModal(title,body,type,id){MC={type,id};document.getElementById('mtitle').textContent=title;document.getElementById('mbody').innerHTML=body;document.getElementById('overlay').classList.add('on')}

function gwCard(){
  let rows=ST.gw.map((g,i)=>{let d=dFrom(g.date),cls=d<0?'dgr':d<=14?'dr':'db';
    return`<div class="item"><div class="dot ${cls}"></div><div style="flex:1"><div class="it">${i+1}. ${fmt(g.date)}</div><div class="im">${d>=0?d+' days from today':'Past'}${g.notes?` · ${esc(g.notes)}`:''}</div></div>${g.link?`<a href="${esc(g.link)}" target="_blank" style="font-size:10px">🔗</a>`:''}</div>`;
  }).join('');
  return`<div class="card"><div class="ch"><h2>🤝 Gene Woods Meetings</h2></div><div class="cb">${rows}</div></div>`;
}

function abCard(title,items,type){
  let rows=items.map((x,i)=>{
    let isH=x.status==='In Progress'||isOv(x.dueDate)||x.status==='Draft ready for EB review';
    return`<div class="item"><div class="dot ${isH?'dr':'dgr'}"></div><div style="flex:1">
      <div class="it">${esc(x.item||x.deadline||x.boardName+' – '+x.item||x.item||'')}</div>
      <div class="im">${x.dateAdded?fmt(x.dateAdded)+' · ':''}${x.status?stB(x.status)+' ':''}${x.owner?owT(x.owner):''}${x.dueDate?' · Due '+fmt(x.dueDate):''}</div>
      ${x.input||x.inputNeeded?`<div style="font-size:11px;color:#374151;margin-top:3px;background:#fff8f0;padding:3px 7px;border-radius:4px;border-left:3px solid var(--rd)">${esc(x.input||x.inputNeeded)}</div>`:''}
      ${x.notes?`<div class="im">${esc(x.notes)}</div>`:''}
      ${x.link?`<a href="${esc(x.link)}" target="_blank" class="b bgr" style="margin-top:3px;font-size:10px">🔗 Open</a>`:''}
    </div></div>`;
  }).join('')||'<div class="im">No items.</div>';
  return`<div class="card"><div class="ch"><h2>${title}</h2><button class="btn br2 bxs no-print" onclick="openNewItem('${type}')">+ Add</button></div><div class="cb">${rows}</div></div>`;
}

// ── WEEKLY BRIEF ──
function rBrief(){
  let wk=ST.briefWeek||'2026-06-04';
  let wkS=dp(wk),wkE=new Date(wkS);wkE.setDate(wkE.getDate()+6);
  let evs=ST.events.filter(e=>e.category!=='EB OOO'&&dp(e.date)>=wkS&&dp(e.date)<=wkE).sort((a,b)=>a.date.localeCompare(b.date));
  let byDay={};evs.forEach(e=>{let d=dp(e.date);let k=d.toDateString();if(!byDay[k]){byDay[k]={label:DAYS[d.getDay()]+', '+MNF[d.getMonth()]+' '+d.getDate()+', '+d.getFullYear(),date:d,evs:[]}}byDay[k].evs.push(e)});
  let hiAttn=evs.filter(e=>['Cabinet','Advocate BOD','WFUBSM BOD','WFU BOT','Strategy Sessions','Board Meeting'].includes(e.category));
  let conflicts=Object.values(byDay).filter(d=>d.evs.length>1&&d.evs.some(e=>e.source==='Ari')&&d.evs.some(e=>e.source==='Maggie'));

  let locRows=Object.values(byDay).map(d=>`<div class="bloc-row"><strong>${d.label.split(',')[0]}, ${d.label.split(', ')[1]}:</strong> ${d.evs.map(e=>esc(e.location||'No location')).filter((v,i,a)=>a.indexOf(v)===i&&v&&v!=='No location').join(', ')||'No location data'}</div>`).join('');

  let hiRows=hiAttn.map(e=>`<div class="bmtg"><div class="bmtg-t">${esc(e.title)}</div><div class="bmtg-d">${fmt(e.date)}${e.time?' · '+esc(e.time):''} · ${esc(e.location||'—')}</div><div class="bmtg-d">${bdg(e.source,e.source==='Ari'?'bg3':'bp')} ${bdg(e.category,CB[e.category])}</div></div>`).join('')||'<div class="im">No high-attention meetings this week.</div>';

  let conflRows=conflicts.map(d=>`<div class="bconflict"><div class="bct">Conflict: ${d.label.split(',')[0]}, ${d.label.split(', ')[1]}</div>${d.evs.map(e=>`<div style="font-size:11px"><strong>${esc(e.title)}</strong> [${e.source}] ${e.time||''}</div>`).join('')}</div>`).join('')||'<div class="im">No same-day source conflicts identified.</div>';

  let upRows=evs.map(e=>`<tr><td>${fmt(e.date)}</td><td style="white-space:nowrap">${esc(e.time||'—')}</td><td><strong>${esc(e.title)}</strong><div style="font-size:10px;color:var(--mu)">${esc(e.location||'')}</div></td></tr>`).join('')||'<tr><td colspan="3" style="text-align:center;color:var(--mu);padding:16px">No events this week</td></tr>';

  let wkLabel=`Week of ${MNF[wkS.getMonth()]} ${wkS.getDate()}, ${wkS.getFullYear()}`;

  document.getElementById('brief').innerHTML=`
<div class="tb no-print">
  <div class="tbl"><label style="font-size:11px;font-weight:700">Week of: <input type="date" class="fc" style="width:160px;display:inline" value="${wk}" onchange="ST.briefWeek=this.value;save();rBrief()"></label></div>
  <button class="btn bn bsm" onclick="doPrint()">🖨 Print Weekly Brief</button>
</div>
<div class="brief-wrap">
  <div style="display:flex;align-items:baseline;gap:18px;margin-bottom:4px">
    <div class="brief-title">Dean/CAO Week in Review</div>
    <div style="font-size:11px;font-weight:700;color:var(--rd)">WFUSM &middot; CAO Division</div>
  </div>
  <div class="brief-week">${wkLabel}</div>

  <div class="brief-lbl">Locations</div>
  ${locRows||'<div class="im">No events scheduled this week.</div>'}

  <div class="brief-lbl">Non-Standard / High-Attention Meetings</div>
  ${hiRows}

  <div class="brief-lbl">Calendar Conflicts</div>
  ${conflRows}

  <div class="brief-lbl">Event Review</div>
  ${evs.map(e=>`<div class="bmtg">
    <div class="bmtg-t">${esc(e.title)}</div>
    <div class="bmtg-d">Remarks: ${stB(e.remarks||'—')}${e.slides?' · Slides: '+stB(e.slides):''} · Organizer: ${owT(e.organizer||'—')}</div>
    ${e.notes?`<div class="bmtg-d" style="font-style:italic">${esc(e.notes)}</div>`:''}
  </div>`).join('')||'<div class="im">No events to review.</div>'}

  <div class="brief-lbl">Upcoming Events</div>
  <table><thead><tr><th>Date</th><th>Time</th><th>Event</th></tr></thead><tbody>${upRows}</tbody></table>
</div>`;
}

function abSec(title,type){
  let rows='';
  if(type==='gw'){rows=ST.gw.map((g,i)=>{let d=dFrom(g.date);return`<div class="ab-row"><div class="ab-num">${i+1}</div><div class="ab-dot" style="background:${d<0?'#9ca3af':d<=14?'var(--rd)':'var(--bl)'}"></div><div class="ab-bd"><div class="ab-t">${fmt(g.date)}</div><div class="ab-m">${d>=0?d+' days from today':'Past'}${g.notes?' · '+esc(g.notes):''}</div></div>${g.link?`<a href="${esc(g.link)}" target="_blank" class="b bgr bxs no-print">🔗</a>`:''}</div>`;}).join('');}
  else if(type==='inc'){rows=ST.incoming.map(x=>`<div class="ab-row"><div class="ab-num">${x.n}</div><div class="ab-dot" style="background:var(--ye)"></div><div class="ab-bd"><div class="ab-t">${esc(x.item)}</div><div class="ab-m">${x.dateAdded?fmt(x.dateAdded)+' · ':''}<em>${esc(x.source)}</em> · ${stB(x.status)}</div>${x.input?`<div class="ab-inp">${esc(x.input)}</div>`:''}</div>${x.link?`<a href="${esc(x.link)}" target="_blank" class="b bgr bxs no-print">🔗</a>`:''}</div>`).join('');}
  else if(type==='asgn'){rows=ST.assignments.map(x=>`<div class="ab-row"><div class="ab-num">${x.n}</div><div class="ab-dot" style="background:${x.status==='Complete'?'var(--gr)':'var(--ye)'}"></div><div class="ab-bd"><div class="ab-t">${esc(x.assignment)}</div><div class="ab-m">${owT(x.assignedTo)} · Assigned ${x.dateAssigned} · Due ${x.due} · ${stB(x.status)}</div>${x.notes?`<div class="ab-m">${esc(x.notes)}</div>`:''}</div>${x.link?`<a href="${esc(x.link)}" target="_blank" class="b bgr bxs no-print">🔗</a>`:''}</div>`).join('');}
  else if(type==='agd'){rows=ST.agendas.map(a=>`<div class="ab-row"><div class="ab-num">${a.n}</div><div class="ab-dot" style="background:${a.status==='Completed'?'var(--gr)':a.status==='In Progress'?'var(--ye)':'var(--rd)'}"></div><div class="ab-bd"><div class="ab-t">${esc(a.meeting)}</div><div class="ab-m">${a.dateAdded?fmt(a.dateAdded)+' · ':''}Mtg: ${fmt(a.mtgDate)} · ${stB(a.status)}${a.notes?' · '+esc(a.notes):''}</div></div>${a.link?`<a href="${esc(a.link)}" target="_blank" class="b bgr bxs no-print">🔗</a>`:''}</div>`).join('');}
  else if(type==='brd'){rows=ST.board.map(b=>`<div class="ab-row"><div class="ab-num">${b.n}</div><div class="ab-dot" style="background:var(--ye)"></div><div class="ab-bd"><div class="ab-t">${esc(b.boardName)} – ${esc(b.item)}</div><div class="ab-m">${fmt(b.dateAdded)} · ${stB(b.status)}</div>${b.notes?`<div class="ab-m">${esc(b.notes)}</div>`:''}</div>${b.link?`<a href="${esc(b.link)}" target="_blank" class="b bgr bxs no-print">🔗</a>`:''}</div>`).join('');}
  else if(type==='dl'){rows=ST.deadlines.map(d=>`<div class="ab-row"><div class="ab-num">${d.n}</div><div class="ab-dot" style="background:${d.status==='Complete'?'var(--gr)':isOv(d.dueDate)?'var(--rd)':'var(--ye)'}"></div><div class="ab-bd"><div class="ab-t">${esc(d.deadline)}</div><div class="ab-m">${owT(d.owner)} · Due: <span class="${isOv(d.dueDate)?'ovd':''}">${fmt(d.dueDate)}</span> · ${stB(d.status)}${d.notes?' · '+esc(d.notes):''}</div></div>${d.link?`<a href="${esc(d.link)}" target="_blank" class="b bgr bxs no-print">🔗</a>`:''}</div>`).join('');}
  else if(type==='fr'){rows=ST.forReview.map(f=>`<div class="ab-row"><div class="ab-num">${f.n}</div><div class="ab-dot" style="background:var(--rd)"></div><div class="ab-bd"><div class="ab-t">${esc(f.item)}</div><div class="ab-m">${f.dateAdded?fmt(f.dateAdded)+' · ':''}${f.requestedBy?'Requested by: '+esc(f.requestedBy)+' · ':''}</div><div class="ab-inp">${esc(f.inputNeeded)}</div>${f.notes?`<div class="ab-m">${esc(f.notes)}</div>`:''}</div>${f.link?`<a href="${esc(f.link)}" target="_blank" class="b bgr bxs no-print">🔗</a>`:''}</div>`).join('');}
  else if(type==='fyi'){rows=ST.fyis.map(f=>`<div class="ab-row"><div class="ab-num">${f.n}</div><div class="ab-dot" style="background:var(--bl)"></div><div class="ab-bd"><div class="ab-t">${fmt(f.dateAdded)} · ${esc(f.update)}</div>${f.why?`<div class="ab-m">${esc(f.why)}</div>`:''}</div>${f.link?`<a href="${esc(f.link)}" target="_blank" class="b bgr bxs no-print">🔗</a>`:''}</div>`).join('');}
  return`<div class="ab-sec"><div class="ab-sh">${title} <span style="color:var(--mu);font-weight:400">(${rows.split('ab-row').length-1})</span></div>${rows||'<div class="ab-m" style="padding:12px 16px">No items.</div>'}</div>`;
}

  </div>
</div>
${calSrc==='overlay'?'<div class="callout co-b" style="margin-bottom:12px">📅 <strong>Master Overlay:</strong> Both Ari\'s Events and Maggie\'s Key Dates. <span class="b bg3">A</span> = Ari &nbsp; <span class="b bp">M</span> = Maggie. Same-day multi-source entries shown together.</div>':''}
${calView==='grid'?buildCalGrid(ev):buildCalList(ev)}`;
}

function buildCalGrid(ev){
  const years=[...new Set(ev.map(e=>dp(e.date).getFullYear()))].sort();
  let h='';
  years.forEach(yr=>{
    h+=`<h3 style="margin:16px 0 10px;font-size:13px;font-weight:800;color:var(--nv)">${yr}</h3><div class="cal-grid">`;
    for(let m=0;m<12;m++){
      let me=ev.filter(e=>{let d=dp(e.date);return d&&d.getMonth()===m&&d.getFullYear()===yr}).sort((a,b)=>a.date.localeCompare(b.date));
      let isnow=m===CURM&&yr===2026;
      h+=`<div class="cmo"><div class="cmh ${isnow?'now':''}">${MNF[m]} ${yr}</div><div class="cmb">`;
      if(!me.length)h+='<div class="im">—</div>';
      me.forEach(e=>{h+=`<div class="pill ${CC[e.category]||'coth'}" onclick="openEvModal('${e.id}')" title="${esc(e.location||'')} · ${esc(e.role||'')}"><span>${dp(e.date).getDate()} ${esc(e.title)}</span><span class="stag">${e.source==='Ari'?'A':'M'}</span></div>`;});
      h+='</div></div>';
    }
    h+='</div>';
  });
  return h;
}

function buildCalList(ev){
  if(!ev.length)return'<div class="card"><div class="cb" style="text-align:center;color:var(--mu);padding:32px">No events found</div></div>';
  let rows=ev.sort((a,b)=>a.date.localeCompare(b.date)).map(e=>`<tr>
    <td style="white-space:nowrap">${fmt(e.date)}</td>
    <td style="white-space:nowrap;color:var(--mu)">${esc(e.time||'—')}</td>
    <td><strong>${esc(e.title)}</strong>${e.notes?`<div class="im">${esc(e.notes)}</div>`:''}</td>
    <td>${bdg(e.source,e.source==='Ari'?'bg3':'bp')}</td>
    <td>${bdg(e.category,CB[e.category]||'bgr')}</td>
    <td style="font-size:11px;color:var(--mu)">${esc(e.location||'—')}</td>
    <td style="font-size:11px">${esc(e.role||'—')}</td>
    <td>${stB(e.remarks||'—')}</td>
    <td class="no-print" style="white-space:nowrap">
      <button class="btn bg2 bxs" onclick="openEvModal('${e.id}')">Edit</button>
      <button class="btn br2 bxs" onclick="delEv('${e.id}')">×</button>
    </td>
  </tr>`).join('');
  return`<div class="card"><div class="tw"><table><thead><tr><th>Date</th><th>Time</th><th>Event</th><th>Src</th><th>Category</th><th>Location</th><th>Role</th><th>Remarks</th><th class="no-print"></th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
}

// ── ROB ──
function rRoB(){
  const cyc={'':'ip','ip':'dn','dn':''};
  const cls={'':'sns','ip':'sip','dn':'sdn'};
  const lbl={'':'','ip':'🟡 In Progress','dn':'✅ Done'};
  let h=`<div class="tb"><div class="tbl"><span style="font-size:11px;color:var(--mu)">Click any cell to cycle: <span style="background:#fff;border:1px solid var(--ln);padding:1px 6px;border-radius:3px;font-size:10px">Blank</span> → <span style="background:#fef3c7;padding:1px 6px;border-radius:3px;font-size:10px">In Progress</span> → <span style="background:#dcfce7;padding:1px 6px;border-radius:3px;font-size:10px">Done</span></span></div><button class="btn bn bsm no-print" onclick="doPrint()">🖨 Print</button></div>
  <div class="rob-wrap"><table class="robt">
    <thead><tr><th>Workstream</th>${MNA.map((m,i)=>`<th style="${i===CURM?'background:var(--rd)':''}">${m}</th>`).join('')}</tr></thead>
    <tbody>`;
  ST.rob.forEach((row,ri)=>{
    h+=`<tr><td>${esc(row.ws)}</td>`;
    row.cells.forEach((cell,ci)=>{
      h+=`<td class="rcl ${cls[row.st[ci]||'']} ${ci===CURM?'rcur':''}" onclick="cycleRob(${ri},${ci})" title="${esc(cell)}">
        ${esc(cell)}<div style="font-size:9px;margin-top:2px">${lbl[row.st[ci]||'']}</div>
      </td>`;
    });
    h+='</tr>';
  });
  h+='</tbody></table></div>';
  document.getElementById('rob').innerHTML=h;
}
function cycleRob(ri,ci){const c={'':'ip','ip':'dn','dn':''};ST.rob[ri].st[ci]=c[ST.rob[ri].st[ci]||''];save();rRoB()}

// ── SOPs ──
function rSOPs(){
  let f=ST.sops.filter(s=>!sopQ||(s.process+s.owner).toLowerCase().includes(sopQ.toLowerCase()));
  let rows=f.map((s,i)=>`<tr>
    <td style="color:var(--mu);font-size:11px">${i+1}</td>
    <td><strong>${esc(s.process)}</strong></td>
    <td>${owT(s.owner)}</td>
    <td>${s.link?`<a href="${esc(s.link)}" target="_blank" class="b bgr" style="font-size:10px">🔗 Open</a>`:'<span style="color:var(--mu);font-size:11px">—</span>'}</td>
    <td style="color:var(--mu);font-size:11px">${esc(s.notes||'—')}</td>
    <td class="no-print" style="white-space:nowrap">
      <button class="btn bg2 bxs" onclick="openSopModal('${s.id}')">Edit</button>
      <button class="btn br2 bxs" onclick="delItem('sops','${s.id}')">×</button>
    </td>
  </tr>`).join('');
  document.getElementById('sops').innerHTML=`
<div class="tb">
  <div class="tbl"><input class="srch" placeholder="Search SOPs..." value="${esc(sopQ)}" oninput="sopQ=this.value;rSOPs()"></div>
  <div class="tbr"><button class="btn br2 bsm no-print" onclick="openSopModal()">+ SOP</button></div>
</div>
<div class="card"><div class="tw"><table><thead><tr><th>#</th><th>Process</th><th>Owner</th><th>SOP Link</th><th>Notes</th><th class="no-print"></th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
}

// ── DELIVERABLES ──
function rDel(){
  let f=ST.tasks.map(t=>({...t,_s:t.status!=='Complete'&&isOv(t.due)?'Overdue':t.status}));
  if(delOw!=='All')f=f.filter(t=>t.owner===delOw);
  if(delSt!=='All')f=f.filter(t=>t._s===delSt);
  if(delQ)f=f.filter(t=>t.title.toLowerCase().includes(delQ.toLowerCase()));
  const ord={'Overdue':0,'In Progress':1,'Not Started':2,'Complete':3};
  f.sort((a,b)=>(ord[a._s]||4)-(ord[b._s]||4)||(a.due||'z').localeCompare(b.due||'z'));
  const owners=['All',...new Set(ST.tasks.map(t=>t.owner))];
  let rows=f.map(t=>{
    let ov=t._s==='Overdue';
    return`<tr>
      <td><strong>${esc(t.title)}</strong>${t.notes?`<div class="im">${esc(t.notes)}</div>`:''}</td>
      <td>${owT(t.owner)}</td>
      <td class="${ov?'ovd':''}" style="white-space:nowrap">${fmt(t.due)}${ov?' ⚠':''}</td>
      <td>${priB(t.priority)}</td>
      <td>${stB(t._s)}</td>
      <td class="no-print" style="white-space:nowrap">
        <button class="btn bg2 bxs" onclick="openTaskModal('${t.id}')">Edit</button>
        <button class="btn br2 bxs" onclick="delItem('tasks','${t.id}')">×</button>
      </td>
    </tr>`;
  }).join('');
  document.getElementById('del').innerHTML=`
<div class="tb">
  <div class="tbl">
    <div class="chips">
      ${['All','Overdue','In Progress','Not Started','Complete'].map(s=>`<div class="chip ${delSt===s?'on':''}" onclick="delSt='${s}';rDel()">${s}</div>`).join('')}
    </div>
    <select class="fc" style="width:auto;padding:4px 8px" onchange="delOw=this.value;rDel()">${owners.map(o=>`<option ${delOw===o?'selected':''}>${esc(o)}</option>`).join('')}</select>
    <input class="srch" placeholder="Search..." value="${esc(delQ)}" oninput="delQ=this.value;rDel()">
  </div>
  <div class="tbr"><button class="btn br2 bsm no-print" onclick="openTaskModal()">+ Task</button></div>
</div>
<div class="card"><div class="tw"><table><thead><tr><th>Title</th><th>Owner</th><th>Due</th><th>Priority</th><th>Status</th><th class="no-print"></th></tr></thead><tbody>${rows||'<tr><td colspan="6" style="text-align:center;color:var(--mu);padding:24px">No items match filter</td></tr>'}</tbody></table></div></div>`;
}

// ═══ MODALS ═══
function openEvModal(id){
  let e=id?ST.events.find(x=>x.id===id):{source:'Ari',category:'Other',remarks:'',slides:''};
  MC={type:'ev',id};
  const catOpts=Object.keys(CC).map(c=>`<option ${e.category===c?'selected':''}>${c}</option>`).join('');
  openModal(id?'Edit Event':'Add Event',`
    <div class="fr"><div class="fg"><label>Title</label><input class="fc" id="f_title" value="${esc(e.title||'')}"></div><div class="fg"><label>Date</label><input type="date" class="fc" id="f_date" value="${e.date||''}"></div></div>
    <div class="fr"><div class="fg"><label>Time</label><input class="fc" id="f_time" value="${esc(e.time||'')}"></div><div class="fg"><label>Source</label><select class="fc" id="f_src"><option ${e.source==='Ari'?'selected':''}>Ari</option><option ${e.source==='Maggie'?'selected':''}>Maggie</option></select></div></div>
    <div class="fr"><div class="fg"><label>Category</label><select class="fc" id="f_cat">${catOpts}</select></div><div class="fg"><label>Location</label><input class="fc" id="f_loc" value="${esc(e.location||'')}"></div></div>
    <div class="fr"><div class="fg"><label>Role</label><input class="fc" id="f_role" value="${esc(e.role||'')}"></div><div class="fg"><label>Organizer</label><input class="fc" id="f_org" value="${esc(e.organizer||'')}"></div></div>
    <div class="fr"><div class="fg"><label>Remarks</label><input class="fc" id="f_rem" value="${esc(e.remarks||'')}"></div><div class="fg"><label>Slides</label><input class="fc" id="f_slides" value="${esc(e.slides||'')}"></div></div>
    <div class="fg"><label>Notes</label><textarea class="fc" id="f_notes">${esc(e.notes||'')}</textarea></div>
  `,'ev',id);
}

function openSopModal(id){
  let s=id?ST.sops.find(x=>x.id===id):{process:'',owner:'',link:'',notes:''};
  MC={type:'sop',id};
  openModal(id?'Edit SOP':'Add SOP',`
    <div class="fg"><label>Process</label><input class="fc" id="f_process" value="${esc(s.process||'')}"></div>
    <div class="fr"><div class="fg"><label>Owner</label><input class="fc" id="f_owner" value="${esc(s.owner||'')}"></div><div class="fg"><label>Notes</label><input class="fc" id="f_notes" value="${esc(s.notes||'')}"></div></div>
    <div class="fg"><label>Link</label><input class="fc" id="f_link" value="${esc(s.link||'')}"></div>
  `,'sop',id);
}

function openTaskModal(id){
  let t=id?ST.tasks.find(x=>x.id===id):{title:'',owner:'',due:'',priority:'Medium',status:'Not Started',notes:''};
  MC={type:'task',id};
  openModal(id?'Edit Task':'Add Task',`
    <div class="fg"><label>Title</label><input class="fc" id="f_title" value="${esc(t.title||'')}"></div>
    <div class="fr"><div class="fg"><label>Owner</label><input class="fc" id="f_owner" value="${esc(t.owner||'')}"></div><div class="fg"><label>Due Date</label><input type="date" class="fc" id="f_due" value="${t.due||''}"></div></div>
    <div class="fr"><div class="fg"><label>Priority</label><select class="fc" id="f_priority"><option ${t.priority==='High'?'selected':''}>High</option><option ${t.priority==='Medium'?'selected':''}>Medium</option><option ${t.priority==='Low'?'selected':''}>Low</option></select></div><div class="fg"><label>Status</label><select class="fc" id="f_status"><option ${t.status==='Not Started'?'selected':''}>Not Started</option><option ${t.status==='In Progress'?'selected':''}>In Progress</option><option ${t.status==='Complete'?'selected':''}>Complete</option></select></div></div>
    <div class="fg"><label>Notes</label><textarea class="fc" id="f_notes">${esc(t.notes||'')}</textarea></div>
  `,'task',id);
}

function openNewItem(type){
  MC={type,id:null};
  if(type==='inc'){openModal('Add Incoming Item',`<div class="fg"><label>Item</label><input class="fc" id="f_item" value=""></div><div class="fg"><label>Source</label><input class="fc" id="f_source" value=""></div><div class="fg"><label>Status</label><input class="fc" id="f_status" value="Pending"></div><div class="fg"><label>Dean Input Needed</label><textarea class="fc" id="f_input"></textarea></div>`,'inc',null);}
  else if(type==='fr'){openModal('Add For Review Item',`<div class="fg"><label>Item</label><input class="fc" id="f_item" value=""></div><div class="fg"><label>Input Needed</label><textarea class="fc" id="f_input"></textarea></div><div class="fg"><label>Requested By</label><input class="fc" id="f_by" value=""></div><div class="fg"><label>Link</label><input class="fc" id="f_link" value=""></div>`,'fr',null);}
}

function saveModal(){
  const t=MC.type,id=MC.id;
  if(t==='ev'){
    const o={id:id||uid(),source:gv('f_src'),title:gv('f_title'),date:gv('f_date'),time:gv('f_time'),location:gv('f_loc'),role:gv('f_role'),organizer:gv('f_org'),category:gv('f_cat'),remarks:gv('f_rem'),slides:gv('f_slides'),notes:gv('f_notes')};
    if(!o.title||!o.date){alert('Title and date required');return}
    if(id){ST.events[ST.events.findIndex(x=>x.id===id)]=o}else ST.events.push(o);
    closeModal();save();rCal();
  } else if(t==='sop'){
    const o={id:id||uid(),process:gv('f_process'),owner:gv('f_owner'),link:gv('f_link'),notes:gv('f_notes')};
    if(!o.process){alert('Process name required');return}
    if(id){ST.sops[ST.sops.findIndex(x=>x.id===id)]=o}else ST.sops.push(o);
    closeModal();save();rSOPs();
  } else if(t==='task'){
    const o={id:id||uid(),title:gv('f_title'),owner:gv('f_owner'),due:gv('f_due'),priority:gv('f_priority'),status:gv('f_status'),notes:gv('f_notes')};
    if(!o.title){alert('Title required');return}
    if(id){ST.tasks[ST.tasks.findIndex(x=>x.id===id)]=o}else ST.tasks.push(o);
    closeModal();save();rDel();
  } else if(t==='inc'){
    const o={id:uid(),n:ST.incoming.length+1,dateAdded:new Date().toISOString().slice(0,10),item:gv('f_item'),source:gv('f_source'),status:gv('f_status'),link:'',input:gv('f_input')};
    ST.incoming.push(o);closeModal();save();rDash();rBoard();
  } else if(t==='fr'){
    const o={id:uid(),n:ST.forReview.length+1,dateAdded:new Date().toISOString().slice(0,10),item:gv('f_item'),inputNeeded:gv('f_input'),requestedBy:gv('f_by'),link:gv('f_link'),notes:''};
    ST.forReview.push(o);closeModal();save();rDash();rBoard();
  }
}

function delEv(id){if(!confirm('Delete event?'))return;ST.events=ST.events.filter(x=>x.id!==id);save();rCal()}
function delItem(arr,id){if(!confirm('Delete?'))return;ST[arr]=ST[arr].filter(x=>x.id!==id);save();renderAll()}

// ═══ INIT ═══
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});
if(!load()){ST=buildSeed();save()}
renderAll();
document.getElementById('ts').textContent='Loaded '+new Date().toLocaleTimeString();
</script>
</body>
</html>
